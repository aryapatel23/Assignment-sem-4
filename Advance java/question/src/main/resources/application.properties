spring.application.name=question
server.port=8080

# Q3: PostgreSQL Configuration for studentdb
# Make sure PostgreSQL is running and database 'studentdb' exists
# You can create it with: CREATE DATABASE studentdb;
spring.datasource.url=jdbc:postgresql://localhost:5432/studentdb
spring.datasource.username=postgres
spring.datasource.password=arya123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration - ddl-auto as requested in Q3
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
